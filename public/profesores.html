<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Calendario profesores</title>
  <link rel="stylesheet" href="/styles.css">
</head>
<body data-audience="teachers">
  <section id="teacher-login" class="login card">
    <img class="site-logo" src="/logo.png" alt="Logo colegio">
    <h1>Calendario profesores</h1>
    <label>Correo del colegio <input id="teacher-email" type="email" placeholder="nombre@alcaste-lasfuentes.com" autocomplete="email"></label>
    <button id="teacher-login-button">Entrar</button>
    <p id="teacher-login-status" class="status"></p>
  </section>
  <main id="teacher-calendar" class="shell" hidden>
    <header class="public-header">
      <img class="site-logo" src="/logo.png" alt="Logo colegio">
      <h1 id="course-title" class="course-title">Calendario curso 2026-2027</h1>
    </header>
    <section class="card month-card">
      <div class="month-controls">
        <button id="previous-month" class="secondary" aria-label="Mes anterior">‹</button>
        <div id="month-title" class="month-title"></div>
        <button id="next-month" class="secondary" aria-label="Mes siguiente">›</button>
      </div>
      <div id="calendar" class="month-calendar"></div>
    </section>
  </main>
  <script src="/app.js"></script>
</body>
</html>
