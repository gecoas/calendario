<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Calendario familias</title>
  <link rel="stylesheet" href="/styles.css">
</head>
<body>
  <main class="shell">
    <h1 id="course-title" class="course-title">Calendario curso 2026-2027</h1>
    <section class="card month-card">
      <div class="month-controls">
        <button id="previous-month" class="secondary" aria-label="Mes anterior">‹</button>
        <div id="month-title" class="month-title"></div>
        <button id="next-month" class="secondary" aria-label="Mes siguiente">›</button>
      </div>
      <div id="calendar" class="month-calendar"></div>
    </section>
  </main>
  <script src="/app.js"></script>
</body>
</html>
