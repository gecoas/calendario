<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Calendario familias</title>
  <link rel="stylesheet" href="/styles.css">
</head>
<body>
  <main class="shell">
    <section class="hero">
      <div>
        <div class="eyebrow">URL para familias</div>
        <h1 id="school-title">Calendario escolar</h1>
        <p>Esta pagina muestra solo los eventos que el colegio ha marcado como visibles para las familias.</p>
      </div>
      <div class="card">
        <div class="toolbar">
          <label>Desde <input id="from" type="date"></label>
          <label>Hasta <input id="to" type="date"></label>
          <button id="filter">Ver eventos</button>
        </div>
      </div>
    </section>
    <section class="card">
      <h2>Eventos publicados</h2>
      <div id="status" class="status"></div>
      <div id="events" class="events"></div>
    </section>
  </main>
  <script src="/app.js"></script>
</body>
</html>
